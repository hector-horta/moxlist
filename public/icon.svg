<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE259"/>
      <stop offset="100%" style="stop-color:#FFA751"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Crown Body -->
    <path d="M 16,90 
             L 16,50 
             L 36,25 
             L 52,60 
             L 64,15 
             L 76,60 
             L 92,25 
             L 112,50 
             L 112,90 
             Z" 
          fill="url(#crown)" 
          stroke="#9E7810" 
          stroke-width="6" 
          stroke-linejoin="round"/>
          
    <!-- Crown Base -->
    <rect x="16" y="90" width="96" height="20" rx="4" 
          fill="url(#crown)" 
          stroke="#9E7810" 
          stroke-width="6" 
          stroke-linejoin="round"/>
          
    <!-- Jewels on Peaks -->
    <circle cx="36" cy="25" r="7" fill="#FF4B4B" stroke="#9E7810" stroke-width="3"/>
    <circle cx="64" cy="15" r="8" fill="#4B8DFF" stroke="#9E7810" stroke-width="3"/>
    <circle cx="92" cy="25" r="7" fill="#4BFF4B" stroke="#9E7810" stroke-width="3"/>
    
    <!-- Jewels on Base -->
    <circle cx="40" cy="100" r="5" fill="#4BFF4B" stroke="#9E7810" stroke-width="2"/>
    <circle cx="64" cy="100" r="5" fill="#FF4B4B" stroke="#9E7810" stroke-width="2"/>
    <circle cx="88" cy="100" r="5" fill="#4B8DFF" stroke="#9E7810" stroke-width="2"/>
  </g>
</svg>
