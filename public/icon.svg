<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1c2333"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </radialGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#FFD700" stroke-width="2" stroke-opacity="0.3"/>
  <g transform="translate(64,64) scale(0.8)" filter="url(#glow)">
    <!-- Crown shape -->
    <path d="M-30,10 L-30,-5 L-18,-15 L-8,0 L0,-20 L8,0 L18,-15 L30,-5 L30,10 Z"
          fill="url(#crown)" stroke="#B8860B" stroke-width="1"/>
    <!-- Crown base -->
    <rect x="-30" y="10" width="60" height="8" rx="2" fill="url(#crown)" stroke="#B8860B" stroke-width="1"/>
    <!-- Crown jewels -->
    <circle cx="-18" cy="-2" r="3" fill="#FF4444" opacity="0.9"/>
    <circle cx="0" cy="-8" r="3.5" fill="#4488FF" opacity="0.9"/>
    <circle cx="18" cy="-2" r="3" fill="#44CC44" opacity="0.9"/>
  </g>
</svg>
