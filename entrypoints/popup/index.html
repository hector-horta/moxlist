<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoxList</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <!-- Header -->
      <header class="header">
        <div class="header-brand">
          <span class="header-icon">👑</span>
          <h1 class="header-title">MoxList</h1>
        </div>
        <p class="header-subtitle">Wishlist Highlighter for Moxfield</p>
      </header>

      <!-- Status Card -->
      <section class="card" id="status-card">
        <div class="status-row">
          <span class="status-label">Status</span>
          <span class="status-value" id="status-value">Loading...</span>
        </div>
        <div class="status-row">
          <span class="status-label">Cards</span>
          <span class="status-value" id="card-count">—</span>
        </div>
        <div class="status-row">
          <span class="status-label">Last Sync</span>
          <span class="status-value" id="last-updated">—</span>
        </div>
      </section>

      <!-- Actions -->
      <section class="card actions-card">
        <button class="btn btn-primary" id="btn-sync">
          <span class="btn-icon">🔄</span>
          Sync Moxfield Wishlist
        </button>
        <button class="btn btn-secondary" id="btn-visit">
          <span class="btn-icon">🌐</span>
          Open Wishlist in Moxfield
        </button>
      </section>

      <!-- Card List -->
      <section class="card list-card" id="list-card" hidden>
        <button class="toggle-section" id="btn-toggle-list">
          <span class="toggle-icon" id="list-toggle-icon">▶</span>
          View Cards
        </button>
        <div class="list-content" id="list-content" hidden>
          <div class="search-box">
            <input
              type="text"
              class="search-input"
              id="search-input"
              placeholder="Search card..."
            />
          </div>
          <ul class="card-list" id="card-list"></ul>
        </div>
      </section>

      <!-- Settings -->
      <section class="card settings-card">
        <div class="setting-row">
          <label for="toggle-enabled">Highlighting active</label>
          <input type="checkbox" class="toggle" id="toggle-enabled" checked />
        </div>
        <div class="setting-row">
          <label for="toggle-badge">Show floating badge</label>
          <input type="checkbox" class="toggle" id="toggle-badge" checked />
        </div>
      </section>

      <!-- Danger Zone -->
      <section class="card danger-card">
        <button class="btn btn-danger" id="btn-clear">
          <span class="btn-icon">🗑️</span>
          Clear Wishlist
        </button>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <span>MoxList v1.0.0</span>
      </footer>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
